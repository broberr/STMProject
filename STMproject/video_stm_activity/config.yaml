seed: 42
device: "cuda"
dtype: "bfloat16"

data:
  videos_dir: "data/videos"
  labels_csv: "data/action_labels.csv"
  frame_stride_seconds: 0.5
  max_frames_per_video: 30


vlm:
  model_id: "llava-hf/llava-1.5-7b-hf"
  load_in_4bit: true
  max_new_tokens: 120
  prompt: |
    Describe what the person is doing in this frame in 1–2 sentences.
    You MUST mention:
    - whether the person is speaking/talking (mouth open, expressive face),
    - whether they are gesturing (hand raised, waving),
    - whether they look at the laptop,
    - whether any video-call interface is visible (Zoom/Teams/Meet, call controls).
    - weather hand gesture or not
    - weather looking at laptop
    If none of these are visible, say "on the laptop" and mention "no clear call cues visible".






llm:
  model_id: "mistralai/Mistral-7B-Instruct-v0.2"
  load_in_4bit: true
  max_new_tokens: 64
  temperature: 0.2
  system_prompt: |
    You are a strict classifier.

    Choose ONLY from:
    [meeting, phone_use, eating_drinking, video_call, using_computer]

    If you are not confident, output: label=uncertain

    Do NOT guess.
    Do NOT explain.
    Output only:
    label=<label>


memory:
  mode: "none"          # "none" or "stm"
  window_seconds: 10
  compress: false
  summary_max_chars: 4000

experiment:
  runs: 1
  output_dir: "outputs"
